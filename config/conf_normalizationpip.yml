General:
  l_filters: 
    - OpSubPipelineFilter
    - FilterCheckNorm
    - FilterLog 
  source : SourceFromFlatArray
  sink : SinkSlices
  n_process : 1


# Source
SourceFromFlatArray:
  type: SourceFromFlatArray
  parms:
    file_path: TO_COMPLETE

# Pipeline Filters
OpSubPipelineFilter:
  type: OpSubPipelineFilter
  source: SourceSub
  sink : None
  parms:
    l_filters:
      - FilterRecenterLine
      - FilterConvertMetrics
      - FilterBoundingBox
      - FilterModuloAngle

SourceSub:
  type : SourceList
  parms:
    l_data : TO_COMPLETE

FilterRecenterLine:
  type: FilterRecenterLine
   
FilterConvertMetrics:
  type: FilterConvertMetrics
  parms:
    request: TO_COMPLETE

FilterBoundingBox:
  type: FilterBoundingBox
  parms:
    request: TO_COMPLETE

FilterModuloAngle:
  type: FilterModuloAngle
  parms:
    request: TO_COMPLETE

FilterCheckNorm:
  type: FilterCheckNorm
  parms:
    
FilterLog:
  type: FilterLog
  parms:
    output_path: 'out/logs'
    clean_up: True

# Sink
SinkSlices:
  type: SinkSlices
  parms:
    output_path: TO_COMPLETE
    slice_length: 500000
    clean_up: True